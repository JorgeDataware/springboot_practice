<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Identidad Institucional | UTEQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #2c3e50;
            --medium-blue: #3e4751;
            --accent-blue: #1a3a5a;
        }

        .identity-container {
            max-width: 900px;
            margin: 40px auto;
        }

        /* Contenedor de cada fila (Flecha + Contenido) */
        .chevron-row {
            display: flex;
            margin-bottom: 12px;
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.1));
        }

        /* La flecha (etiqueta izquierda) */
        .chevron-label {
            width: 220px;
            min-width: 220px;
            height: 100px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            /* Crea la forma de flecha apuntando a la derecha */
            clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%);
            z-index: 2;
        }

        /* El bloque de contenido (derecha) */
        .chevron-body {
            background: white;
            flex-grow: 1;
            margin-left: -35px; /* Superposición para el efecto visual */
            padding: 15px 20px 15px 50px;
            display: flex;
            align-items: center;
            border-radius: 0 8px 8px 0;
            font-size: 1.05rem;
            line-height: 1.4;
            color: #333;
            border: 1px solid #eee;
        }

        /* Colores específicos según la imagen */
        .bg-mision { background-color: var(--medium-blue); }
        .bg-vision { background-color: var(--dark-blue); }
        .bg-politica { background-color: #ffffff; color: #333 !important; border: 1px solid #ddd; }
        .bg-objetivos { background-color: var(--dark-blue); }
        .bg-valores { background-color: var(--medium-blue); }

        /* Estilo para los valores como tags */
        .value-badge {
            display: inline-block;
            background: #f8f9fa;
            border-left: 4px solid var(--accent-blue);
            padding: 4px 12px;
            margin: 4px;
            font-weight: 600;
            color: var(--accent-blue);
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{Fragments/fragment1 :: menu}"></div>

<div class="container identity-container">

    <div class="text-center mb-5">
        <h2 class="fw-bold" style="color: var(--accent-blue);">Identidad Institucional</h2>
        <hr class="mx-auto" style="width: 100px; height: 4px; background-color: var(--accent-blue); opacity: 1;">
    </div>

    <div th:if="${identidad != null}">

        <div class="chevron-row">
            <div class="chevron-label bg-mision">Misión</div>
            <div class="chevron-body" th:text="${identidad.mision}"></div>
        </div>

        <div class="chevron-row">
            <div class="chevron-label bg-vision">Visión</div>
            <div class="chevron-body" th:text="${identidad.vision}"></div>
        </div>

        <div class="chevron-row">
            <div class="chevron-label bg-politica">Política</div>
            <div class="chevron-body" th:text="${identidad.policy}"></div>
        </div>

        <div class="chevron-row">
            <div class="chevron-label bg-objetivos">Objetivos</div>
            <div class="chevron-body" th:text="${identidad.sgeObjectives}"></div>
        </div>

        <div class="chevron-row">
            <div class="chevron-label bg-valores">Valores</div>
            <div class="chevron-body">
                <div>
                    <span th:each="val : ${#strings.arraySplit(identidad.values, ',')}"
                          class="value-badge" th:text="${#strings.trim(val)}"></span>
                </div>
            </div>
        </div>

    </div>

    <div th:unless="${identidad != null}" class="alert alert-info text-center shadow-sm">
        <i class="bi bi-info-circle"></i> La información de identidad institucional se encuentra en mantenimiento.
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
