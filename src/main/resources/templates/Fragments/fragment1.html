<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
<nav th:fragment="menu" class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Oferta Educativa</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/ofertas">Ofertas Educativas</a>
                </li>
                <!-- Menú desplegable Alumno - requiere autenticación -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownAlumno" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Alumno
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdownAlumno">
                        <li><a class="dropdown-item" href="/alumno/admisiones">Admisiones</a></li>
                        <li><a class="dropdown-item" href="/alumno/valores">Valores Institucionales</a></li>
                        <li><a class="dropdown-item" href="/alumno/mapa-sitio">Mapa del Sitio</a></li>
                    </ul>
                </li>
                <!-- Enlaces de administración - solo para ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/consola/gestion_ofertas">Gestionar Ofertas</a>
                </li>
                <!-- Gestionar Divisiones - para ADMIN o COORDINADOR -->
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'COORDINADOR')">
                    <a class="nav-link" href="/consola/gestion_divisiones">Gestionar Divisiones</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'COORDINADOR')">
                    <a class="nav-link" href="/consola/gestion_divisiones">Gestionar Divisiones</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-primary fw-bold" href="/send-email/form">Enviar Correo</a>
                </li>
            </ul>
            <!-- Usuario autenticado y botón de logout -->
            <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
                <span class="navbar-text me-3">
                    Hola, <span sec:authentication="name"></span>
                    <span class="badge bg-primary ms-1" sec:authorize="hasRole('ADMIN')">Admin</span>
                    <span class="badge bg-info ms-1" sec:authorize="hasRole('COORDINADOR') and !hasRole('ADMIN')">Coordinador</span>
                    <span class="badge bg-secondary ms-1" sec:authorize="hasRole('USER') and !hasRole('ADMIN') and !hasRole('COORDINADOR')">Usuario</span>
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
                </form>
            </div>
            <!-- Botón de Login cuando no está autenticado -->
            <div class="d-flex align-items-center" sec:authorize="!isAuthenticated()">
                <a href="/login" class="btn btn-outline-primary btn-sm">Iniciar sesión</a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
